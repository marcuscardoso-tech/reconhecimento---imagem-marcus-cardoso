<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Um aplicativo simples de To-Do gerenciado diretamente no navegador.">
    <meta property="og:title" content="To-Do App">
    <meta property="og:description" content="Um aplicativo simples de To-Do gerenciado diretamente no navegador.">
    <meta property="og:type" content="website">
    <title>To-Do App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 transition-all">

    <!-- Auth Container -->
    <div id="auth-container" class="w-full max-w-md glass rounded-2xl p-8 shadow-2xl transition-all duration-300">
        
        <!-- Login Form -->
        <div id="login-form-container">
            <h2 class="text-3xl font-bold mb-6 text-center text-white">Entrar</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">E-mail</label>
                    <input type="email" id="login-email" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                    <p id="login-email-error" class="text-red-400 text-xs mt-1 hidden"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Senha</label>
                    <input type="password" id="login-password" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                    <p id="login-password-error" class="text-red-400 text-xs mt-1 hidden"></p>
                </div>
                <p id="login-general-error" class="text-red-400 text-sm hidden text-center"></p>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">Login</button>
            </form>
            <p class="mt-6 text-center text-slate-400 text-sm">
                Não tem uma conta? <button id="show-register" class="text-blue-400 hover:text-blue-300 transition-colors font-medium">Cadastre-se</button>
            </p>
        </div>

        <!-- Register Form -->
        <div id="register-form-container" class="hidden">
            <h2 class="text-3xl font-bold mb-6 text-center text-white">Cadastrar</h2>
            <form id="register-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Nome</label>
                    <input type="text" id="register-name" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                    <p id="register-name-error" class="text-red-400 text-xs mt-1 hidden"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">E-mail</label>
                    <input type="email" id="register-email" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                    <p id="register-email-error" class="text-red-400 text-xs mt-1 hidden"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Senha</label>
                    <input type="password" id="register-password" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                    <p id="register-password-error" class="text-red-400 text-xs mt-1 hidden"></p>
                </div>
                <p id="register-general-error" class="text-red-400 text-sm hidden text-center"></p>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">Criar Conta</button>
            </form>
            <p class="mt-6 text-center text-slate-400 text-sm">
                Já possui uma conta? <button id="show-login" class="text-blue-400 hover:text-blue-300 transition-colors font-medium">Fazer Login</button>
            </p>
        </div>
    </div>

    <!-- Dashboard Container -->
    <div id="dashboard-container" class="hidden w-full max-w-5xl mx-auto h-[95vh] sm:h-[90vh] flex flex-col pt-4">
        <!-- Header -->
        <header class="glass rounded-2xl p-6 mb-6 shadow-lg flex justify-between items-center">
            <h1 id="greeting" class="text-2xl font-bold text-white"></h1>
            <button id="logout-btn" class="bg-slate-700 hover:bg-red-500/90 text-white px-5 py-2 rounded-lg transition-colors text-sm font-medium border border-slate-600 hover:border-red-400/50">
                Logout
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 flex-1 overflow-hidden pb-4">
            <!-- Create Task Form -->
            <div class="glass rounded-2xl p-6 shadow-lg h-fit overflow-y-auto max-h-full">
                <h2 class="text-xl font-bold mb-4 text-white">Nova Tarefa</h2>
                <form id="task-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Título</label>
                        <input type="text" id="task-title" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                        <p id="task-title-error" class="text-red-400 text-xs mt-1 hidden"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Tipo</label>
                        <select id="task-type" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors appearance-none">
                            <option value="Trabalho">Trabalho</option>
                            <option value="Pessoal">Pessoal</option>
                            <option value="Estudos">Estudos</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Descrição (Opcional)</label>
                        <textarea id="task-desc" rows="3" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors resize-none"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors">Adicionar Tarefa</button>
                </form>
            </div>

            <!-- Tasks List -->
            <div class="md:col-span-2 glass rounded-2xl p-6 shadow-lg overflow-y-auto flex flex-col max-h-full">
                <h2 class="text-xl font-bold mb-4 text-white">Minhas Tarefas</h2>
                <div id="tasks-list" class="space-y-4 flex-1">
                    <!-- Cards de tarefa renderizados aqui -->
                </div>
                <div id="no-tasks-msg" class="hidden flex-1 flex items-center justify-center text-slate-400">
                    Nenhuma tarefa cadastrada ainda.
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
